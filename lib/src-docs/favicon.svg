<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
    <defs>
        <linearGradient id="docGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#ffffff"/>
            <stop offset="1" stop-color="#e8edf3"/>
        </linearGradient>
        <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#2c5f8a"/>
            <stop offset="1" stop-color="#1a3f5a"/>
        </linearGradient>
    </defs>

    <!-- Rounded background -->
    <rect x="2" y="2" width="60" height="60" rx="12" ry="12" fill="url(#bgGrad)"/>

    <!-- Document / text-file body -->
    <rect x="14" y="10" width="36" height="44" rx="3" ry="3" fill="url(#docGrad)" stroke="#c4d0de" stroke-width="0.75"/>

    <!-- Folded corner -->
    <path d="M 44 10 L 50 10 L 50 16 Z" fill="#c4d0de"/>
    <path d="M 44 10 L 44 16 L 50 16 Z" fill="#f4f6f9"/>

    <!-- Grid of fields (table of values) -->
    <g stroke="#2c5f8a" stroke-width="1.5" fill="none">
        <!-- outer table box -->
        <rect x="19" y="17" width="26" height="31" rx="1.5" ry="1.5"/>
        <!-- header separator -->
        <line x1="19" y1="24" x2="45" y2="24"/>
        <!-- row separators -->
        <line x1="19" y1="31" x2="45" y2="31"/>
        <line x1="19" y1="38" x2="45" y2="38"/>
        <line x1="19" y1="45" x2="45" y2="45"/>
        <!-- column separator (delimiter) -->
        <line x1="32" y1="17" x2="32" y2="48"/>
    </g>

    <!-- Header row accent (schema/meta) -->
    <rect x="19.75" y="17.75" width="25" height="5.5" fill="#3d7fb0" opacity="0.55" rx="0.75"/>

    <!-- Field value dots -->
    <g fill="#2c5f8a">
        <circle cx="25.5" cy="27.5" r="1.6"/>
        <circle cx="38.5" cy="27.5" r="1.6"/>
        <circle cx="25.5" cy="34.5" r="1.6"/>
        <circle cx="38.5" cy="34.5" r="1.6"/>
        <circle cx="25.5" cy="41.5" r="1.6"/>
        <circle cx="38.5" cy="41.5" r="1.6"/>
    </g>
</svg>
